<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MV Maker Mobile - Neon Professional</title>
    <style>
        :root { --gold: #f39c12; --lyric-sub: rgba(255,255,255,0.35); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }

        .viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.3); z-index: 1; transition: 0.8s; }
        
        .stage-wrapper { position: relative; flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; z-index: 10; padding: 20px 0; }

        .player-side { position: relative; width: 280px; display: flex; justify-content: center; }
        
        /* 唱針：固定位置 */
        .tonearm {
            position: absolute; width: 140px; top: -15px; right: -10px; z-index: 100;
            transform-origin: 120px 25px; transform: rotate(-38deg); transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.6)); pointer-events: none;
        }
        .tonearm.active { transform: rotate(5deg); }

        .platter {
            width: 260px; height: 260px; border-radius: 50%;
            background: #111; border: 5px solid #222;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .record-spin { 
            width: 245px; height: 245px; border-radius: 50%; overflow: hidden; 
            animation: rotate 20s linear infinite; animation-play-state: paused; 
            position: relative; background: #000; 
        }
        #record-img { position: absolute; height: 100%; min-width: 100%; left: 50%; transform: translateX(-50%); transition: opacity 0.3s; }
        .placeholder-text { position: absolute; color: rgba(255,255,255,0.2); font-size: 14px; letter-spacing: 4px; text-shadow: 0 0 10px #fff; z-index: 0; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* [關鍵] 素雅發光符號按鈕 */
        .turntable-controls { 
            margin: 15px 0; 
            display: flex; 
            gap: 15px; 
            justify-content: center;
            pointer-events: auto;
        }
        .turntable-controls span { 
            cursor: pointer; display: inline-block; width: 60px; text-align: center;
            color: #fff; 
            font-size: 26px; /* 調大尺寸讓發光明顯 */
            font-weight: normal;
            opacity: 0.9;
            /* 三層發光：強化霓虹質感 */
            text-shadow: 0 0 10px #fff, 0 0 20px rgba(255,255,255,0.6), 0 0 30px rgba(255,255,255,0.2);
            transition: 0.3s;
            -webkit-text-fill-color: white; /* 確保 iOS 不會變色 */
        }
        .turntable-controls span:active { transform: scale(0.9); opacity: 1; }

        .lyrics-side { width: 90%; height: 180px; overflow: hidden; position: relative; mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent); }
        #lyrics-list { position: absolute; width: 100%; top: 75px; transition: 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); list-style: none; padding: 0; margin: 0; text-align: center; }
        .lyric-line { padding: 12px 0; font-size: 17px; color: var(--lyric-sub); line-height: 1.4; transition: 0.3s; }
        .lyric-line.active { color: #fff; font-size: 22px; font-weight: bold; text-shadow: 0 0 15px #fff; opacity: 1; }

        .ui-panel { position: relative; width: 100%; padding-bottom: 35px; background: linear-gradient(transparent, #000); z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .seek-box { width: 85%; display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        #seek-bar { flex: 1; height: 5px; accent-color: var(--gold); }
        .time-lab { font-size: 11px; font-family: monospace; opacity: 0.7; min-width: 40px; text-align: center; }

        .btn-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 90%; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .btn-dl { background: var(--gold); color: #000; border: none; flex-basis: 90%; margin-top: 8px; padding: 12px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="viewport">
        <div id="bg"></div>
        <div class="stage-wrapper">
            <div class="player-side">
                <svg class="tonearm" id="arm" viewBox="0 0 250 300">
                    <circle cx="190" cy="40" r="22" fill="#222" stroke="#444" stroke-width="2"/>
                    <path d="M190,40 L190,130 L160,210 L145,240" stroke="#e0e0e0" stroke-width="10" fill="none" stroke-linecap="round"/>
                    <rect x="130" y="240" width="30" height="40" rx="3" fill="#1a1a1a" />
                </svg>
                <div class="platter">
                    <div class="record-spin" id="spin-box">
                        <div class="placeholder-text">READY</div>
                        <img id="record-img" src="" style="opacity:0;">
                    </div>
                </div>
            </div>
            
            <div class="turntable-controls">
                <span id="btn-loop">&#10227;&#xFE0E;</span> <span id="btn-prev">&#9194;&#xFE0E;</span>  <span id="btn-toggle">&#9654;&#xFE0E;</span> <span id="btn-next">&#9193;&#xFE0E;</span>  <span id="btn-like">&#9825;&#xFE0E;</span>  </div>

            <div class="lyrics-side">
                <ul id="lyrics-list"><li class="lyric-line">尚未載入歌詞...</li></ul>
            </div>
        </div>

        <div class="ui-panel">
            <div class="seek-box">
                <span id="cur-time" class="time-lab">00:00</span>
                <input type="range" id="seek-bar" value="0" step="0.01">
                <span id="total-time" class="time-lab">00:00</span>
            </div>
            <div class="btn-row">
                <label class="btn" for="up-img">📸 圖片</label>
                <label class="btn" for="up-mp3">🎵 音樂</label>
                <label class="btn" for="up-lrc">📄 LRC</label>
                <button class="btn btn-dl" id="dl-btn">💾 輸出錄製 MV</button>
            </div>
        </div>
    </div>

    <input type="file" id="up-img" accept="image/*" style="display:none">
    <input type="file" id="up-mp3" accept="audio/mp3" style="display:none">
    <input type="file" id="up-lrc" accept=".lrc" style="display:none">
    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        const seekBar = document.getElementById('seek-bar');
        const lyricsList = document.getElementById('lyrics-list');
        const recordImg = document.getElementById('record-img');
        const arm = document.getElementById('arm');
        const spinBox = document.getElementById('spin-box');
        let lyricsData = [];

        document.getElementById('up-img').onchange = (e) => {
            const url = URL.createObjectURL(e.target.files[0]);
            recordImg.src = url; recordImg.style.opacity = 1;
            document.getElementById('bg').style.backgroundImage = `url(${url})`;
        };

        document.getElementById('up-mp3').onchange = (e) => {
            audio.src = URL.createObjectURL(e.target.files[0]);
            audio.onloadedmetadata = () => { 
                seekBar.max = audio.duration; 
                document.getElementById('total-time').innerText = formatTime(audio.duration); 
            };
        };
        seekBar.oninput = () => { audio.currentTime = seekBar.value; };

        document.getElementById('up-lrc').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const lines = ev.target.result.split('\n');
                lyricsData = lines.map(line => {
                    const m = line.match(/\[(\d+):(\d+(\.\d+)?)\]/);
                    if (m) {
                        const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
                        let text = line.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').replace(/<.*?>/g, '').replace(/\{.*?\}/g, '').trim();
                        return text ? { time, text } : null;
                    }
                    return null;
                }).filter(x => x);
                lyricsList.innerHTML = lyricsData.map(l => `<li class="lyric-line">${l.text}</li>`).join('');
            };
            reader.readAsText(e.target.files[0]);
        };

        function togglePlay() {
            const btn = document.getElementById('btn-toggle');
            if(audio.paused) { 
                audio.play(); 
                spinBox.style.animationPlayState = 'running'; 
                arm.classList.add('active'); 
                btn.innerHTML = "&#9208;&#xFE0E;"; // 暫停符號
            } else { 
                audio.pause(); 
                spinBox.style.animationPlayState = 'paused'; 
                arm.classList.remove('active'); 
                btn.innerHTML = "&#9654;&#xFE0E;"; // 播放符號
            }
        }
        document.getElementById('btn-toggle').onclick = togglePlay;
        document.getElementById('btn-prev').onclick = () => { audio.currentTime = 0; };
        document.getElementById('btn-next').onclick = () => { audio.currentTime += 10; };

        audio.ontimeupdate = () => {
            seekBar.value = audio.currentTime;
            document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
            const index = lyricsData.findIndex((l, i) => audio.currentTime >= l.time && (!lyricsData[i+1] || audio.currentTime < lyricsData[i+1].time));
            if (index !== -1) {
                const lines = document.querySelectorAll('.lyric-line');
                lines.forEach(l => l.classList.remove('active'));
                if(lines[index]) {
                    lines[index].classList.add('active');
                    lyricsList.style.transform = `translateY(-${index * 46}px)`;
                }
            }
        };

        function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }
    </script>
</body>
</html>
