<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MV Maker Pro - Final Minimalist</title>
    <style>
        :root { --gold: #f39c12; --lyric-sub: rgba(255,255,255,0.3); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }

        .viewport { 
            width: 100vw; height: 100vh; display: flex; flex-direction: column; 
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            box-sizing: border-box; background: #000; position: relative;
        }
        
        #bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.2) blur(20px); z-index: 1; transition: 0.8s; }
        
        .stage-wrapper { position: relative; flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; gap: 8px; }

        .player-side { position: relative; width: 280px; display: flex; justify-content: center; margin-bottom: 5px; }
        .tonearm { 
            position: absolute; width: 130px; top: -10px; right: -10px; z-index: 100; 
            transform-origin: 110px 25px; transform: rotate(-38deg); transition: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 10px 8px rgba(0,0,0,0.6));
        }
        .tonearm.active { transform: rotate(5deg); }

        .platter {
            width: 240px; height: 240px; border-radius: 50%; background: #111; border: 4px solid #222;
            box-shadow: 0 10px 45px rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; position: relative;
        }
        .record-spin { 
            width: 225px; height: 225px; border-radius: 50%; overflow: hidden; 
            animation: rotate 20s linear infinite; animation-play-state: paused; background: #000; 
        }
        #record-img { position: absolute; height: 100%; min-width: 100%; left: 50%; transform: translateX(-50%); transition: opacity 0.4s; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .turntable-controls { margin: 15px 0; display: flex; gap: 20px; justify-content: center; }
        .turntable-controls span { 
            cursor: pointer; font-size: 32px; 
            text-shadow: 0 0 10px #fff, 0 0 20px rgba(255,255,255,0.7), 0 0 30px rgba(255,255,255,0.3); 
            -webkit-text-fill-color: white; transition: 0.2s;
        }

        .lyrics-side { 
            width: 90%; height: 240px; overflow: hidden; position: relative; 
            mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent); 
            margin: 10px 0;
        }
        #lyrics-list { position: absolute; width: 100%; top: 90px; transition: 0.4s; list-style: none; padding: 0; margin: 0; text-align: center; }
        .lyric-line { padding: 12px 0; font-size: 16px; color: var(--lyric-sub); line-height: 1.4; transition: 0.3s; }
        .lyric-line.active { color: #fff; font-size: 22px; font-weight: bold; text-shadow: 0 0 15px #fff; }

        .upload-tools { position: absolute; bottom: 5px; right: 10px; display: flex; gap: 10px; z-index: 100; opacity: 0.35; }
        .mini-btn { background: rgba(255,255,255,0.15); color: #fff; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; border: 1px solid rgba(255,255,255,0.2); }

        .ui-panel { position: relative; width: 100%; padding-bottom: 25px; z-index: 1000; display: flex; flex-direction: column; align-items: center; background: linear-gradient(transparent, #000); }
        .seek-box { width: 85%; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        #seek-bar { flex: 1; height: 5px; accent-color: var(--gold); }
        .time-lab { font-size: 11px; opacity: 0.5; min-width: 40px; text-align: center; font-family: monospace; }

        .btn-rec { background: var(--gold); color: #000; border: none; width: 85%; padding: 15px; border-radius: 12px; font-weight: bold; font-size: 14px; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="viewport">
        <div id="bg"></div>
        <div class="stage-wrapper">
            <div class="player-side">
                <svg class="tonearm" id="arm" viewBox="0 0 250 300">
                    <circle cx="190" cy="40" r="22" fill="#222" stroke="#444" stroke-width="2"/>
                    <path d="M190,40 L190,130 L160,210 L145,240" stroke="#eee" stroke-width="10" fill="none" stroke-linecap="round"/>
                    <rect x="130" y="240" width="30" height="40" rx="3" fill="#111" />
                </svg>
                <div class="platter">
                    <div class="record-spin" id="spin-box">
                        <img id="record-img" src="" style="opacity:0;">
                    </div>
                </div>
            </div>
            <div class="turntable-controls">
                <span id="btn-loop">&#10227;&#xFE0E;</span><span id="btn-prev">&#9194;&#xFE0E;</span><span id="btn-toggle">&#9654;&#xFE0E;</span><span id="btn-next">&#9193;&#xFE0E;</span><span id="btn-like">&#9825;&#xFE0E;</span>
            </div>
            <div class="lyrics-side">
                <ul id="lyrics-list"><li class="lyric-line">尚未載入素材...</li></ul>
                <div class="upload-tools">
                    <label class="mini-btn" for="up-img">📸</label>
                    <label class="mini-btn" for="up-mp3">🎵</label>
                    <label class="mini-btn" for="up-lrc">📄</label>
                </div>
            </div>
        </div>
        <div class="ui-panel">
            <div class="seek-box">
                <span id="cur-time" class="time-lab">00:00</span>
                <input type="range" id="seek-bar" value="0" step="0.01">
                <span id="total-time" class="time-lab">00:00</span>
            </div>
            <button class="btn btn-rec" id="rec-btn">⏺ 開始同步錄製 MV</button>
        </div>
    </div>

    <input type="file" id="up-img" accept="image/*" style="display:none"><input type="file" id="up-mp3" accept="audio/mp3" style="display:none"><input type="file" id="up-lrc" accept=".lrc" style="display:none">
    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        const seekBar = document.getElementById('seek-bar');
        const lyricsList = document.getElementById('lyrics-list');
        const recordImg = document.getElementById('record-img');
        const arm = document.getElementById('arm');
        const spinBox = document.getElementById('spin-box');
        let lyricsData = [];

        document.getElementById('up-img').onchange = (e) => {
            const url = URL.createObjectURL(e.target.files[0]);
            recordImg.src = url; recordImg.style.opacity = 1;
            document.getElementById('bg').style.backgroundImage = `url(${url})`;
        };
        document.getElementById('up-mp3').onchange = (e) => {
            audio.src = URL.createObjectURL(e.target.files[0]);
            audio.onloadedmetadata = () => { seekBar.max = audio.duration; document.getElementById('total-time').innerText = formatTime(audio.duration); };
        };
        document.getElementById('up-lrc').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const lines = ev.target.result.split('\n');
                lyricsData = lines.map(line => {
                    const m = line.match(/\[(\d+):(\d+(\.\d+)?)\]/);
                    if (m) {
                        const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
                        let text = line.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').replace(/<.*?>/g, '').replace(/\{.*?\}/g, '').trim();
                        return text ? { time, text } : null;
                    }
                    return null;
                }).filter(x => x);
                lyricsList.innerHTML = lyricsData.map(l => `<li class="lyric-line">${l.text}</li>`).join('');
            };
            reader.readAsText(e.target.files[0]);
        };

        function togglePlay() {
            if(audio.paused) { 
                audio.play(); spinBox.style.animationPlayState = 'running'; arm.classList.add('active'); 
                document.getElementById('btn-toggle').innerHTML = "&#9208;&#xFE0E;";
            } else { 
                audio.pause(); spinBox.style.animationPlayState = 'paused'; arm.classList.remove('active'); 
                document.getElementById('btn-toggle').innerHTML = "&#9654;&#xFE0E;";
            }
        }
        document.getElementById('btn-toggle').onclick = togglePlay;
        document.getElementById('btn-prev').onclick = () => { audio.currentTime = 0; };
        document.getElementById('btn-next').onclick = () => { audio.currentTime += 10; };

        audio.ontimeupdate = () => {
            seekBar.value = audio.currentTime;
            document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
            const index = lyricsData.findIndex((l, i) => audio.currentTime >= l.time && (!lyricsData[i+1] || audio.currentTime < lyricsData[i+1].time));
            if (index !== -1) {
                const lines = document.querySelectorAll('.lyric-line');
                lines.forEach(l => l.classList.remove('active'));
                if(lines[index]) {
                    lines[index].classList.add('active');
                    lyricsList.style.transform = `translateY(-${index * 44}px)`;
                }
            }
        };

        seekBar.oninput = () => { audio.currentTime = seekBar.value; };
        function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }

        document.getElementById('rec-btn').onclick = () => {
            alert("iPad/iPhone 請使用內建錄影。開始錄影後，按下播放鍵即可同步錄製畫面。");
        };
    </script>
</body>
</html>
