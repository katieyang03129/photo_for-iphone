<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MV Maker Mobile Edition</title>
    <style>
        :root { --gold: #f39c12; --lyric-sub: rgba(255,255,255,0.3); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        .viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        #bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.3); z-index: 1; transition: 0.8s; }
        
        /* 比例分配：舞台區佔 75% 高度 */
        .stage-wrapper {
            position: relative; height: 75vh; width: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 10; gap: 2vh;
        }

        /* 唱機大小隨螢幕高度縮放 */
        .player-side { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .platter {
            width: 60vw; height: 60vw; max-width: 280px; max-height: 280px;
            border-radius: 50%; background: #111; border: 4px solid #222;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .record-spin { width: 92%; height: 92%; border-radius: 50%; overflow: hidden; animation: rotate 20s linear infinite; animation-play-state: paused; position: relative; background: #000; }
        #record-img { position: absolute; height: 100%; min-width: 100%; left: 50%; transform: translateX(-50%); }
        
        /* 提示文字 */
        .placeholder-text { position: absolute; color: rgba(255,255,255,0.2); font-size: 12px; letter-spacing: 3px; text-shadow: 0 0 8px #fff; z-index: 0; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 歌詞區比例縮減 */
        .lyrics-side { width: 85%; height: 25vh; overflow: hidden; position: relative; mask-image: linear-gradient(to bottom, transparent, black 25%, black 75%, transparent); }
        #lyrics-list { position: absolute; width: 100%; top: 10vh; transition: 0.4s cubic-bezier(0.1, 0.9, 0.2, 1); list-style: none; padding: 0; margin: 0; text-align: center; }
        .lyric-line { padding: 1.5vh 0; font-size: 16px; color: var(--lyric-sub); line-height: 1.2; }
        .lyric-line.active { color: #fff; font-size: 20px; font-weight: bold; text-shadow: 0 0 15px #fff; }

        /* 控制按鈕：固定大小避免 Emoji 撐大 */
        .turntable-controls { display: flex; gap: 15px; justify-content: center; margin-top: 1vh; }
        .turntable-controls span { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #fff; text-shadow: 0 0 10px #fff; 
        }

        /* 底部操作面板佔 25% */
        .ui-panel {
            height: 25vh; width: 100%; background: linear-gradient(transparent, #000);
            z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .seek-box { width: 85%; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        #seek-bar { flex: 1; accent-color: var(--gold); }
        .time-lab { font-size: 10px; opacity: 0.6; width: 35px; }

        .btn-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; width: 90%; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 6px 12px; border-radius: 15px; font-size: 11px; }
        .btn-dl { background: var(--gold); color: #000; border: none; flex-basis: 90%; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="viewport">
        <div id="bg"></div>
        <div class="stage-wrapper">
            <div class="player-side">
                <div class="platter">
                    <div class="record-spin" id="spin-box">
                        <div class="placeholder-text">READY</div>
                        <img id="record-img" src="">
                    </div>
                </div>
                <div class="turntable-controls">
                    <span id="btn-loop">⇄</span>
                    <span id="btn-prev">⏮</span>
                    <span id="btn-toggle">▶</span>
                    <span id="btn-next">⏭</span>
                    <span id="btn-like">♡</span>
                </div>
            </div>
            <div class="lyrics-side">
                <ul id="lyrics-list"><li class="lyric-line">尚未載入歌詞...</li></ul>
            </div>
        </div>
        <div class="ui-panel">
            <div class="seek-box">
                <span id="cur-time" class="time-lab">00:00</span>
                <input type="range" id="seek-bar" value="0" step="0.01">
                <span id="total-time" class="time-lab">00:00</span>
            </div>
            <div class="btn-row">
                <label class="btn" for="up-img">📸 圖片</label>
                <label class="btn" for="up-mp3">🎵 音樂</label>
                <label class="btn" for="up-lrc">📄 LRC</label>
                <button class="btn btn-dl" id="dl-btn">💾 輸出錄製 MV</button>
            </div>
        </div>
    </div>
    <input type="file" id="up-img" accept="image/*" style="display:none">
    <input type="file" id="up-mp3" accept="audio/mp3" style="display:none">
    <input type="file" id="up-lrc" accept=".lrc" style="display:none">
    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        const seekBar = document.getElementById('seek-bar');
        const lyricsList = document.getElementById('lyrics-list');
        let lyricsData = [];

        // 圖片處理
        document.getElementById('up-img').onchange = (e) => {
            const url = URL.createObjectURL(e.target.files[0]);
            document.getElementById('record-img').src = url;
            document.getElementById('bg').style.backgroundImage = `url(${url})`;
        };

        // 音樂與進度條
        document.getElementById('up-mp3').onchange = (e) => {
            audio.src = URL.createObjectURL(e.target.files[0]);
            audio.onloadedmetadata = () => { seekBar.max = audio.duration; document.getElementById('total-time').innerText = formatTime(audio.duration); };
        };
        seekBar.oninput = () => { audio.currentTime = seekBar.value; };

        // [核心修正] 強力過濾 LRC 雜訊
        document.getElementById('up-lrc').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const lines = ev.target.result.split('\n');
                lyricsData = lines.map(line => {
                    const m = line.match(/\[(\d+):(\d+(\.\d+)?)\]/);
                    if (m) {
                        const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
                        const text = line.replace(/\[.*?\]/g, '').replace(/<.*?>/g, '').trim();
                        return text ? { time, text } : null;
                    }
                    return null;
                }).filter(x => x);
                lyricsList.innerHTML = lyricsData.map(l => `<li class="lyric-line">${l.text}</li>`).join('');
            };
            reader.readAsText(e.target.files[0]);
        };

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('spin-box').style.animationPlayState='running'; }
            else { audio.pause(); document.getElementById('spin-box').style.animationPlayState='paused'; }
        }
        document.getElementById('btn-toggle').onclick = togglePlay;

        audio.ontimeupdate = () => {
            seekBar.value = audio.currentTime;
            document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
            const index = lyricsData.findIndex((l, i) => audio.currentTime >= l.time && (!lyricsData[i+1] || audio.currentTime < lyricsData[i+1].time));
            if (index !== -1) {
                const lines = document.querySelectorAll('.lyric-line');
                lines.forEach(l => l.classList.remove('active'));
                lines[index].classList.add('active');
                // 動態計算捲動高度
                const lineHeight = lines[0].offsetHeight;
                lyricsList.style.transform = `translateY(-${index * lineHeight}px)`;
            }
        };

        function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }
    </script>
</body>
</html>
