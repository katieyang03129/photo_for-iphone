<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MV Maker Final Mobile</title>
    <style>
        :root { --gold: #f39c12; --lyric-sub: rgba(255,255,255,0.4); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: #fff; font-family: -apple-system, sans-serif; overflow: hidden; }

        .viewport { width: 100vw; height: 100vh; position: relative; overflow: hidden; background: #000; display: flex; flex-direction: column; }
        #bg { position: absolute; inset: 0; background-size: cover; background-position: center; filter: brightness(0.3); z-index: 1; transition: 0.8s; }
        
        .stage-wrapper { position: relative; flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; z-index: 10; padding-top: 10px; }

        /* 唱盤比例優化 */
        .player-side { width: 100%; display: flex; flex-direction: column; align-items: center; }
        .platter {
            width: 260px; height: 260px; border-radius: 50%;
            background: #111; border: 5px solid #222;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .record-spin { width: 245px; height: 245px; border-radius: 50%; overflow: hidden; animation: rotate 20s linear infinite; animation-play-state: paused; position: relative; background: #000; }
        #record-img { position: absolute; height: 100%; min-width: 100%; left: 50%; transform: translateX(-50%); transition: opacity 0.3s; }
        .placeholder-text { position: absolute; color: rgba(255,255,255,0.2); font-size: 14px; letter-spacing: 4px; text-shadow: 0 0 10px #fff; z-index: 0; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* 控制按鈕：強制禁止 Emoji */
        .turntable-controls { margin-top: 15px; display: flex; gap: 20px; color: #fff; text-shadow: 0 0 15px rgba(255,255,255,0.9); }
        .turntable-controls span { 
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            font-size: 24px; cursor: pointer; color: white !important; -webkit-text-fill-color: white !important;
        }

        /* 歌詞區：精準解析過濾後顯示 */
        .lyrics-side { width: 90%; height: 180px; overflow: hidden; position: relative; mask-image: linear-gradient(to bottom, transparent, black 30%, black 70%, transparent); }
        #lyrics-list { position: absolute; width: 100%; top: 75px; transition: 0.4s; list-style: none; padding: 0; margin: 0; text-align: center; }
        .lyric-line { padding: 12px 0; font-size: 17px; color: var(--lyric-sub); line-height: 1.3; }
        .lyric-line.active { color: #fff; font-size: 22px; font-weight: bold; text-shadow: 0 0 15px #fff; }

        /* 操作面板：縮小比例 */
        .ui-panel { position: relative; width: 100%; padding-bottom: 30px; background: linear-gradient(transparent, #000); z-index: 1000; display: flex; flex-direction: column; align-items: center; }
        .seek-box { width: 85%; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        #seek-bar { flex: 1; accent-color: var(--gold); }
        .time-lab { font-size: 11px; opacity: 0.7; width: 40px; }

        .btn-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; width: 90%; }
        .btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 12px; }
        .btn-dl { background: var(--gold); color: #000; border: none; flex-basis: 90%; margin-top: 5px; padding: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="viewport">
        <div id="bg"></div>
        <div class="stage-wrapper">
            <div class="player-side">
                <div class="platter">
                    <div class="record-spin" id="spin-box">
                        <div class="placeholder-text">READY</div>
                        <img id="record-img" src="" style="opacity:0;">
                    </div>
                </div>
                <div class="turntable-controls">
                    <span id="btn-loop">⇄&#xFE0E;</span>
                    <span id="btn-prev">⏮&#xFE0E;</span>
                    <span id="btn-toggle">▶&#xFE0E;</span>
                    <span id="btn-next">⏭&#xFE0E;</span>
                    <span id="btn-like">♡&#xFE0E;</span>
                </div>
            </div>
            <div class="lyrics-side">
                <ul id="lyrics-list"><li class="lyric-line">尚未載入歌詞...</li></ul>
            </div>
        </div>
        <div class="ui-panel">
            <div class="seek-box">
                <span id="cur-time" class="time-lab">00:00</span>
                <input type="range" id="seek-bar" value="0" step="0.01">
                <span id="total-time" class="time-lab">00:00</span>
            </div>
            <div class="btn-row">
                <label class="btn" for="up-img">📸 圖片</label>
                <label class="btn" for="up-mp3">🎵 音樂</label>
                <label class="btn" for="up-lrc">📄 LRC</label>
                <button class="btn btn-dl" id="dl-btn">💾 輸出錄製 MV</button>
            </div>
        </div>
    </div>

    <input type="file" id="up-img" accept="image/*" style="display:none">
    <input type="file" id="up-mp3" accept="audio/mp3" style="display:none">
    <input type="file" id="up-lrc" accept=".lrc" style="display:none">
    <audio id="audio-player"></audio>

    <script>
        const audio = document.getElementById('audio-player');
        const seekBar = document.getElementById('seek-bar');
        const lyricsList = document.getElementById('lyrics-list');
        const recordImg = document.getElementById('record-img');
        let lyricsData = [];

        document.getElementById('up-img').onchange = (e) => {
            const url = URL.createObjectURL(e.target.files[0]);
            recordImg.src = url; recordImg.style.opacity = 1;
            document.getElementById('bg').style.backgroundImage = `url(${url})`;
        };

        document.getElementById('up-mp3').onchange = (e) => {
            audio.src = URL.createObjectURL(e.target.files[0]);
            audio.onloadedmetadata = () => { seekBar.max = audio.duration; document.getElementById('total-time').innerText = formatTime(audio.duration); };
        };

        // [核心修正] 超強力解析器：殺掉所有括號雜訊
        document.getElementById('up-lrc').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const lines = ev.target.result.split('\n');
                lyricsData = lines.map(line => {
                    const m = line.match(/\[(\d+):(\d+(\.\d+)?)\]/);
                    if (m) {
                        const time = parseInt(m[1]) * 60 + parseFloat(m[2]);
                        // 強力過濾：[ ]、( )、< >、{ } 全殺掉
                        let text = line.replace(/\[.*?\]/g, '')
                                       .replace(/\(.*?\)/g, '')
                                       .replace(/<.*?>/g, '')
                                       .replace(/\{.*?\}/g, '')
                                       .trim();
                        return text ? { time, text } : null;
                    }
                    return null;
                }).filter(x => x);
                lyricsList.innerHTML = lyricsData.map(l => `<li class="lyric-line">${l.text}</li>`).join('');
            };
            reader.readAsText(e.target.files[0]);
        };

        function togglePlay() {
            if(audio.paused) { 
                audio.play(); 
                document.getElementById('spin-box').style.animationPlayState='running'; 
                document.getElementById('btn-toggle').innerText = "⏸\uFE0E";
            } else { 
                audio.pause(); 
                document.getElementById('spin-box').style.animationPlayState='paused'; 
                document.getElementById('btn-toggle').innerText = "▶\uFE0E";
            }
        }
        document.getElementById('btn-toggle').onclick = togglePlay;

        audio.ontimeupdate = () => {
            seekBar.value = audio.currentTime;
            document.getElementById('cur-time').innerText = formatTime(audio.currentTime);
            const index = lyricsData.findIndex((l, i) => audio.currentTime >= l.time && (!lyricsData[i+1] || audio.currentTime < lyricsData[i+1].time));
            if (index !== -1) {
                const lines = document.querySelectorAll('.lyric-line');
                lines.forEach(l => l.classList.remove('active'));
                lines[index].classList.add('active');
                lyricsList.style.transform = `translateY(-${index * 46}px)`;
            }
        };

        function formatTime(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }
        seekBar.oninput = () => { audio.currentTime = seekBar.value; };
    </script>
</body>
</html>
